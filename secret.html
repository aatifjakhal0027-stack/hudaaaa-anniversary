<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>A Letter For You 💌</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#ffe6f0;
font-family:"Dancing Script", cursive;
overflow:hidden;
}

/* envelope */

.envelope{
font-size:120px;
cursor:pointer;
text-align:center;
}

/* paper */

.paper{
display:none;
background:#fff8e7;
width:520px;
min-height:330px;
padding:40px;
border-radius:10px;
box-shadow:0 15px 35px rgba(0,0,0,0.25);
position:relative;
}

/* notebook margin */

.paper::before{
content:"";
position:absolute;
left:40px;
top:0;
bottom:0;
width:2px;
background:#ffd1dc;
}

/* letter */

#letter{
margin-left:25px;
font-size:26px;
line-height:1.7;
color:#444;
}

/* signature */

.signature{
margin-top:30px;
color:#ff4d88;
}

/* button */

.center{
text-align:center;
margin-top:30px;
}

button{
padding:12px 30px;
font-size:18px;
border:none;
border-radius:30px;
background:#ff8fb1;
color:white;
cursor:pointer;
}

/* floating hearts */

.heart{
position:absolute;
bottom:-20px;
font-size:20px;
animation:float 8s linear infinite;
color:#ff8fb1;
}

@keyframes float{

0%{
transform:translateY(0);
opacity:1;
}

100%{
transform:translateY(-110vh);
opacity:0;
}

}

</style>
</head>

<body>

<div class="envelope" onclick="openLetter()">✉️</div>

<div class="paper" id="paper">

<div id="letter">

<strong>Dear Hudaaaa 😭💗</strong><br><br>

<span id="message"></span>

<div class="signature">
<br>Your cute little boy 😗💗
</div>

</div>

<div class="center">
<button id="continueBtn" style="display:none;" onclick="nextPage()">Continue 💗</button>
</div>

</div>

<script>

const message = `yaarrrr finally hame 1 year hogya ek sath time ka pata hi nahi laga yaarrrr ye meri life ka sabse best time tha yaarrr 😭🎀 i loveeeee youuuuu soooo soooo muchhhh mwahhhhhhhhh 😭🎀💗💋
like ha ek dusre ke itna close hogye hai yaarrr ek dusre ko chord to kya chordne ka soch bhi nahi sakte yaarrrr 😭🎀
ham dono se iss 1 saal me bhot galtiya hui hai aur ham dono ek dusre ke liye itna change hue hai ab ham ek new fresh start karenge yaarrr 😭🎀
ab bhot hogyi galtiya aur ek dusre ko hurt karna ab hame future ke bare me sochna hai yaarrrr 😭🎀
agar hamari ladai hogyi aur breakup hogya to hamari shadi kaise hogi??? aur fir bacche kaise honge??? aur ham baccho ki ptm me kaise jayenge???
dekho meri jaan ab hame apni life eksath spend karni hai yaarrr aur hamne ye commitment karli hai yaarrr ab to bass ham shadi karke hi manenge heheeeeee 😭🎀`;

let i = 0;

function openLetter(){

document.querySelector(".envelope").style.display="none";
document.getElementById("paper").style.display="block";

typeLetter();

}

function typeLetter(){

let typing = setInterval(()=>{

if(i < message.length){
document.getElementById("message").innerHTML += message.charAt(i);
i++;
}
else{
clearInterval(typing);
document.getElementById("continueBtn").style.display="block";
}

},30);

}

/* floating hearts */

setInterval(()=>{

const heart=document.createElement("div");

heart.classList.add("heart");
heart.innerHTML="💗";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*20+15)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},8000);

},500);

function nextPage(){
window.location.href="counter.html";
}

</script>

</body>
</html>
