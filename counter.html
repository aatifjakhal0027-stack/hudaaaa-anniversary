<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Time Together 💗</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#ffe6f0;
font-family:"Comic Sans MS", cursive;
text-align:center;
overflow:hidden;
}

h1{
color:#ff4d88;
margin-bottom:20px;
}

/* timer box */

.counter{
font-size:28px;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* heart */

.heart-container{
margin-top:30px;
font-size:80px;
position:relative;
}

#heartFill{
position:absolute;
top:0;
left:0;
width:0%;
overflow:hidden;
}

/* message */

#forever{
margin-top:20px;
font-size:24px;
color:#ff4d88;
display:none;
}

/* button */

button{
margin-top:35px;
padding:12px 30px;
font-size:18px;
border:none;
border-radius:30px;
background:#ff8fb1;
color:white;
cursor:pointer;
display:none;
}

/* floating hearts */

.heart{
position:absolute;
bottom:-20px;
font-size:20px;
animation:float 8s linear infinite;
color:#ff8fb1;
}

@keyframes float{

0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-110vh);opacity:0;}

}

</style>
</head>

<body>

<h1>We've been together for 💗</h1>

<div class="counter">
<span id="time"></span>
</div>

<div class="heart-container">
<span>🤍</span>
<span id="heartFill">❤️</span>
</div>

<div id="forever"></div>

<button id="continueBtn" onclick="nextPage()">Final Surprise 🎵</button>

<script>

/* START DATE */

const startDate = new Date("2025-03-17 00:00:00");

/* TIMER */

function updateTimer(){

const now = new Date();
const diff = now - startDate;

const seconds = Math.floor(diff/1000);
const minutes = Math.floor(seconds/60);
const hours = Math.floor(minutes/60);
const days = Math.floor(hours/24);

document.getElementById("time").innerHTML =
days + " Days ❤️<br>" +
hours + " Hours ⏰<br>" +
minutes + " Minutes ⏳<br>" +
seconds + " Seconds 💗";

}

setInterval(updateTimer,1000);

/* HEART FILL */

let width = 0;

let heartAnim = setInterval(()=>{

width += 2;

document.getElementById("heartFill").style.width = width + "%";

if(width >= 100){
clearInterval(heartAnim);
}

},80);

/* INFINITY MESSAGE */

setTimeout(()=>{

document.getElementById("forever").innerHTML = "... ♾️<br><br>This is only the beginning of our forever 💗";
document.getElementById("forever").style.display="block";

document.getElementById("continueBtn").style.display="block";

},3000);

/* FLOATING HEARTS */

setInterval(()=>{

const heart=document.createElement("div");

heart.classList.add("heart");
heart.innerHTML="💗";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*20+15)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},8000);

},500);

function nextPage(){
window.location.href="final.html";
}

</script>

</body>
</html>
